name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest      # Apple Silicon (arm64)
            platform: macOS-arm64
            artifact_name: BatesPosture-macOS-arm64.dmg

          - os: windows-latest
            platform: Windows
            artifact_name: BatesPosture-Windows.zip

          - os: ubuntu-22.04
            platform: Linux
            artifact_name: BatesPosture-Linux.tar.gz

    steps:
      # ── checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python + uv ─────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies (including PyInstaller)
        run: uv sync --all-groups

      # ── Linux system libraries for Qt / OpenCV / MediaPipe ─────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxcb-xinerama0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xfixes0 libxkbcommon-x11-0 libegl1 libgl1-mesa-glx \
            libglib2.0-0 libsm6 libxext6 libxrender1 \
            libdbus-1-3 libxcomposite1 libxdamage1 libxfixes3 \
            fuse libfuse2

      # ── icon conversion ──────────────────────────────────────────────────────
      - name: Convert icon → .ico (Windows)
        if: runner.os == 'Windows'
        run: |
          uv run python - <<'EOF'
          from PIL import Image
          img = Image.open("src/static/icon.png").convert("RGBA")
          img.save("src/static/icon.ico", format="ICO",
                   sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print("icon.ico written")
          EOF
        shell: bash

      - name: Convert icon → .icns (macOS)
        if: runner.os == 'macOS'
        run: |
          ICONSET=src/static/icon.iconset
          mkdir -p "$ICONSET"
          for size in 16 32 64 128 256 512; do
            sips -z $size $size src/static/icon.png \
              --out "$ICONSET/icon_${size}x${size}.png"          > /dev/null 2>&1
            sips -z $((size*2)) $((size*2)) src/static/icon.png \
              --out "$ICONSET/icon_${size}x${size}@2x.png"       > /dev/null 2>&1
          done
          iconutil -c icns "$ICONSET" -o src/static/icon.icns
          echo "icon.icns written"

      # ── PyInstaller build ───────────────────────────────────────────────────
      - name: Build with PyInstaller (Linux — offscreen Qt)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pyinstaller batesposture.spec --noconfirm

      - name: Build with PyInstaller (macOS / Windows)
        if: runner.os != 'Linux'
        run: uv run pyinstaller batesposture.spec --noconfirm

      # ── Resolve version tag ──────────────────────────────────────────────────
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # ── Package artifacts ────────────────────────────────────────────────────
      - name: Package → DMG (macOS)
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          DMG_NAME="BatesPosture-${VERSION}-${{ matrix.platform }}.dmg"
          hdiutil create \
            -volname "BatesPosture" \
            -srcfolder "dist/BatesPosture.app" \
            -ov -format UDZO \
            "${DMG_NAME}"
          echo "artifact_path=${DMG_NAME}" >> "$GITHUB_ENV"
          echo "artifact_file=${DMG_NAME}" >> "$GITHUB_ENV"

      - name: Package → ZIP (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.tag }}"
          $ZIP_NAME = "BatesPosture-${VERSION}-Windows.zip"
          Compress-Archive -Path "dist\BatesPosture\*" -DestinationPath $ZIP_NAME
          echo "artifact_path=$ZIP_NAME" >> $env:GITHUB_ENV
          echo "artifact_file=$ZIP_NAME" >> $env:GITHUB_ENV

      - name: Package → tar.gz (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          TARBALL="BatesPosture-${VERSION}-Linux.tar.gz"
          tar -czf "${TARBALL}" -C dist BatesPosture
          echo "artifact_path=${TARBALL}" >> "$GITHUB_ENV"
          echo "artifact_file=${TARBALL}" >> "$GITHUB_ENV"

      # ── Upload build artifact (available between jobs) ───────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: ${{ env.artifact_path }}
          retention-days: 7

  # ── Create GitHub Release and attach all artifacts ─────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "BatesPosture ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Download

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `BatesPosture-${{ steps.version.outputs.tag }}-macOS-arm64.dmg` |
            | Windows | `BatesPosture-${{ steps.version.outputs.tag }}-Windows.zip` |
            | Linux | `BatesPosture-${{ steps.version.outputs.tag }}-Linux.tar.gz` |

            ### Install

            **macOS** — Open the `.dmg` and drag **BatesPosture** to Applications.
            First launch: right-click → Open (bypasses Gatekeeper on unsigned builds).

            **Windows** — Extract the zip and run `BatesPosture.exe`.

            **Linux** — Extract the tar.gz and run `./BatesPosture/BatesPosture`.
            Ensure your desktop environment supports system-tray icons (most do).

            ### Requirements

            - A webcam
            - macOS 12+, Windows 10+, or a modern Linux desktop
