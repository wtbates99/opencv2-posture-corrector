name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows

          - os: ubuntu-22.04
            platform: Linux

    steps:
      # ── checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python + uv ─────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies (including PyInstaller)
        run: uv sync --all-groups

      # ── Linux system libraries needed at build time ──────────────────────────
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libxcb-xinerama0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xfixes0 libxkbcommon-x11-0 libegl1 libgl1-mesa-glx \
            libglib2.0-0 libsm6 libxext6 libxrender1 \
            libdbus-1-3 libxcomposite1 libxdamage1 libxfixes3 \
            fuse libfuse2

      # ── icon conversion ──────────────────────────────────────────────────────
      - name: Convert icon → .ico (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          uv run python - <<'EOF'
          from PIL import Image
          img = Image.open("src/static/icon.png").convert("RGBA")
          img.save("src/static/icon.ico", format="ICO",
                   sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])
          print("icon.ico written")
          EOF

      # ── PyInstaller build ────────────────────────────────────────────────────
      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pyinstaller batesposture.spec --noconfirm

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: uv run pyinstaller batesposture.spec --noconfirm

      # ── Resolve version tag ──────────────────────────────────────────────────
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      # ── Windows: Inno Setup installer (.exe, no admin required) ─────────────
      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION     = "${{ steps.version.outputs.tag }}"
          $VERSION_NUM = $VERSION -replace '^v', ''
          $OUT_NAME    = "BatesPosture-$VERSION-Setup"
          $ISCC        = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $ISCC `
            "/DAppVersion=$VERSION_NUM" `
            "/DOutputFilename=$OUT_NAME" `
            "scripts\setup.iss"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          "artifact_path=installer-output\$OUT_NAME.exe" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── Linux: AppImage (self-contained, zero system deps for end users) ─────
      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          APPIMAGE_NAME="BatesPosture-${VERSION}-Linux.AppImage"

          # Download appimagetool (itself an AppImage; use --appimage-extract-and-run
          # so FUSE is not required on the CI runner)
          wget -q \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O appimagetool
          chmod +x appimagetool

          # Build AppDir
          mkdir -p BatesPosture.AppDir
          cp -r dist/BatesPosture          BatesPosture.AppDir/
          cp src/static/icon.png           BatesPosture.AppDir/batesposture.png
          cp scripts/batesposture.desktop  BatesPosture.AppDir/
          cp scripts/AppRun                BatesPosture.AppDir/AppRun
          chmod +x BatesPosture.AppDir/AppRun

          # Package
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            BatesPosture.AppDir "${APPIMAGE_NAME}"

          echo "artifact_path=${APPIMAGE_NAME}" >> "$GITHUB_ENV"

      # ── Upload artifact (shared between jobs) ────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: ${{ env.artifact_path }}
          retention-days: 7

  # ── Create GitHub Release and attach all artifacts ──────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "BatesPosture ${{ steps.version.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
          body: |
            ## Download

            | Platform | File |
            |---|---|
            | **Windows 10/11** (64-bit) | `BatesPosture-${{ steps.version.outputs.tag }}-Setup.exe` |
            | **Linux** x86-64 | `BatesPosture-${{ steps.version.outputs.tag }}-Linux.AppImage` |

            ---

            ### Windows

            1. Download **`BatesPosture-${{ steps.version.outputs.tag }}-Setup.exe`** and run it.
            2. The installer does **not** require administrator rights — it installs to your user profile and adds a Start Menu entry.
            3. If Windows SmartScreen shows a warning, click **More info → Run anyway** (expected for unsigned executables).
            4. Grant camera permission when Windows prompts you — the app needs it to monitor posture.
            5. BatesPosture appears in your system tray (bottom-right corner).

            ### Linux

            ```bash
            chmod +x BatesPosture-${{ steps.version.outputs.tag }}-Linux.AppImage
            ./BatesPosture-${{ steps.version.outputs.tag }}-Linux.AppImage
            ```

            The AppImage is **fully self-contained** — no Python, no system libraries, no installation required.
            GNOME users may need the [AppIndicator extension](https://extensions.gnome.org/extension/615/appindicator-support/) for system-tray support.

            ---

            ### Requirements

            - A webcam (built-in or USB)
            - Windows 10/11 (64-bit) **or** a modern Linux desktop (Ubuntu 20.04+, Fedora 35+, etc.)
